{% set name = "libgsf" %}
{% set version = "1.14.54" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://download.gnome.org/sources/{{ name }}/{{ ".".join(version.split(".")[:2]) }}/{{ name }}-{{ version }}.tar.xz
  sha256: d18869264a2513cfb071712486d115dada064ff8a040265b49936bca06f17623

build:
  number: 0
  skip: true  # [win]
  run_exports:
    - {{ pin_subpackage("libgsf", max_pin="x.x") }}

requirements:
  build:
    - {{ stdlib('c') }}
    - {{ compiler('c') }}
    - gnuconfig  # [unix]
    - make       # [unix]
    - perl *
    - perl-xml-parser
    - pkg-config
  host:
    - bzip2 {{ bzip2 }}
    - glib {{ glib }}
    - libxml2 {{ libxml2 }}
    - zlib {{ zlib }}
    - gettext {{ gettext }}  # [osx]

test:
  requires:
    - pkg-config
  commands:
    - gsf --help
    - gsf --version

    # pkg-config must know about lib and flags
    - pkg-config --exists libgsf-1
    - pkg-config --modversion libgsf-1
    - pkg-config --cflags libgsf-1
    - pkg-config --libs libgsf-1

    # check linking against righ libs
    - ldd $PREFIX/bin/gsf           # [linux]
    - otool -L $PREFIX/bin/gsf      # [osx]

    # test gsf zip
    - test -x $PREFIX/bin/libgsf-zip && $PREFIX/bin/libgsf-zip --help   # [unix]

about:
  home: https://gitlab.gnome.org/GNOME/libgsf
  license: GPL-2.0-only
  license_family: GPL
  license_file: COPYING
  summary: The G Structured File Library
  description: |
    The project aims to provide an efficient extensible i/o abstraction
    for dealing with different structured file formats.
  doc_url: https://gitlab.gnome.org/GNOME/libgsf
  dev_url: https://gitlab.gnome.org/GNOME/libgsf

extra:
  recipe-maintainers:
    - sebastian-luna-valero
    - katietz
